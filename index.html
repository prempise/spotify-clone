<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify – Web Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #root {
            height: 100%;
        }

        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #535353;
            border-radius: 6px;
            border: 3px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b3b3b3;
            background-clip: content-box;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes eq1 {

            0%,
            100% {
                height: 4px
            }

            50% {
                height: 14px
            }
        }

        @keyframes eq2 {

            0%,
            100% {
                height: 10px
            }

            33% {
                height: 4px
            }

            66% {
                height: 14px
            }
        }

        @keyframes eq3 {

            0%,
            100% {
                height: 8px
            }

            40% {
                height: 14px
            }

            80% {
                height: 4px
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200px 0
            }

            100% {
                background-position: 200px 0
            }
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%)
            }

            to {
                transform: translateX(0)
            }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        @keyframes pageFadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.15s ease-out;
        }

        .animate-slideUp {
            animation: slideUp 0.25s ease-out;
        }

        .animate-toastIn {
            animation: toastIn 0.28s ease-out;
        }

        .animate-slideInLeft {
            animation: slideInLeft 0.3s ease-out;
        }

        .animate-slideInUp {
            animation: slideInUp 0.3s ease-out;
        }

        .animate-pageFade {
            animation: pageFadeIn 0.15s ease-out;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .skeleton {
            background: linear-gradient(90deg, #282828 25%, #3e3e3e 50%, #282828 75%);
            background-size: 400px 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        .card-play-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1DB954;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s, background 0.1s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .card-wrap:hover .card-play-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .card-play-btn:hover {
            background: #1ed760;
            transform: translateY(0) scale(1.06) !important;
        }

        .quick-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1DB954;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.2s, transform 0.2s, background 0.1s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            margin-right: 8px;
        }

        .quick-card:hover .quick-play-btn {
            opacity: 1;
            transform: scale(1);
        }

        .quick-play-btn:hover {
            background: #1ed760;
        }

        .big-play-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1DB954;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.1s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .big-play-btn:hover {
            background: #1ed760;
            transform: scale(1.06);
        }

        input[type=range] {
            -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
        }

        @media (hover: none) {
            .card-play-btn {
                opacity: 1 !important;
                transform: translateY(0) !important;
            }

            .quick-play-btn {
                opacity: 1 !important;
                transform: scale(1) !important;
            }
        }

        @media (max-width: 768px) {
            .card-play-btn {
                width: 40px;
                height: 40px;
            }

            .big-play-btn {
                width: 48px;
                height: 48px;
            }

            .quick-card {
                height: 48px !important;
            }

            .quick-card img {
                width: 48px !important;
                height: 48px !important;
            }

            .desktop-sidebar {
                display: none !important;
            }

            .mobile-bottom-nav {
                display: flex !important;
            }

            .desktop-queue {
                display: none !important;
            }
        }

        @media (min-width: 769px) {
            .mobile-bottom-nav {
                display: none !important;
            }

            .mobile-hamburger {
                display: none !important;
            }

            .mobile-now-playing-overlay {
                display: none !important;
            }
        }

        @media (max-width: 480px) {
            .card-play-btn {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>

        const SpotifyAPI = (() => {
            const CLIENT_ID = '1a070e1f2fb04af48ce15b7debde2c69';
            const CLIENT_SECRET = '5a81353ed06440f8a666a859a02b0bfd';
            let _token = null;
            let _tokenExpiry = 0;

            const getAccessToken = async () => {
                if (_token && Date.now() < _tokenExpiry) return _token;
                try {
                    const resp = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: 'grant_type=client_credentials',
                    });
                    if (!resp.ok) { console.error('Token fetch failed', resp.status); return null; }
                    const data = await resp.json();
                    _token = data.access_token;
                    _tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
                    return _token;
                } catch (e) { console.error('Token error', e); return null; }
            };

            const apiCall = async (url, retry = true) => {
                const token = await getAccessToken();
                if (!token) return null;
                try {
                    const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
                    if (resp.status === 401 && retry) {
                        _token = null; _tokenExpiry = 0;
                        return apiCall(url, false);
                    }
                    if (!resp.ok) { console.error('API error', resp.status, url); return null; }
                    return await resp.json();
                } catch (e) { console.error('API fetch error', e); return null; }
            };

            return {
                getAccessToken,
                searchSpotify: (query, types = ['track', 'artist', 'album', 'playlist'], limit = 20) =>
                    apiCall(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=${types.join(',')}&limit=${limit}`),
                getArtist: (id) => apiCall(`https://api.spotify.com/v1/artists/${id}`),

            };

        const mapSpotifyArtist = (a) => {
            if (!a) return null;
            const imgs = a.images || [];
            return {
                id: a.id, name: a.name,
                image: imgs.find(i => i.width >= 200 && i.width <= 400)?.url || imgs[imgs.length > 1 ? 1 : 0]?.url || imgs[0]?.url || 'https://picsum.photos/seed/default/300',
                header: imgs[0]?.url || 'https://picsum.photos/seed/default/1200/400',
                monthly: a.followers?.total || 0, followers: a.followers?.total || 0,
                genres: a.genres || [], verified: true, bio: '',
                isSpotify: true,
            };
        };

        const mapSpotifyAlbum = (al) => {
            if (!al) return null;
            const imgs = al.images || [];
            return {
                id: al.id, title: al.name, artistId: al.artists?.[0]?.id || '', artistName: al.artists?.[0]?.name || '',
                cover: imgs[imgs.length > 1 ? 1 : 0]?.url || imgs[0]?.url || 'https://picsum.photos/seed/default/300',
                year: al.release_date ? parseInt(al.release_date.substring(0, 4)) : 2024,
                type: al.album_type || 'album', label: al.label || '', copyright: al.copyrights?.[0]?.text || '',
                isSpotify: true,
            };
        };

        const mapSpotifyPlaylist = (pl) => {
            if (!pl) return null;
            const imgs = pl.images || [];
            return {
                id: pl.id, name: pl.name, description: pl.description || '',
                cover: imgs[0]?.url || 'https://picsum.photos/seed/default/300',
                owner: pl.owner?.display_name || 'Spotify', isLikedSongs: false,
                trackIds: [], followers: pl.tracks?.total || 0, isPublic: true, isSpotify: true,
            };
        };

        const isSpotifyId = (id) => id && id.length >= 10 && !id.startsWith('a') && !id.startsWith('al') && !id.startsWith('t') && !id.startsWith('pl') && !id.startsWith('c');

        /* ===================== UTILS ===================== */
        const fmtTime = (s) => { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2, "0")}`; };
        const fmtNum = (n) => { if (n >= 1e9) return (n / 1e9).toFixed(1) + "B"; if (n >= 1e6) return (n / 1e6).toFixed(1) + "M"; if (n >= 1e3) return (n / 1e3).toFixed(1) + "K"; return String(n); };
        const greeting = () => { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening"; };
        const getArtist = id => ARTISTS.find(a => a.id === id);
        const getAlbum = id => ALBUMS.find(a => a.id === id);
        const getTrack = id => TRACKS.find(t => t.id === id);
        const tracksForAlbum = albumId => TRACKS.filter(t => t.albumId === albumId);
        const tracksForArtist = artistId => TRACKS.filter(t => t.artistId === artistId);
        const albumsForArtist = artistId => ALBUMS.filter(a => a.artistId === artistId);
        const enrichTrack = t => {
            if (!t) return t;
            if (t.isSpotify) return { ...t, artistName: t.artistName || '', albumTitle: t.albumTitle || '' };
            return { ...t, artistName: getArtist(t.artistId)?.name || "", albumTitle: getAlbum(t.albumId)?.title || "" };
        };
        const heroGrad = name => { const palette = ["#1a472a", "#1e3264", "#503750", "#477D95", "#8D67AB", "#861515", "#1b3a4b", "#2d4a22", "#8b4513"]; return palette[Math.abs((name || 'a').charCodeAt(0)) % palette.length]; };

        /* ===================== HOOKS ===================== */
        const useIsMobile = (breakpoint = 768) => {
            const [isMobile, setIsMobile] = useState(window.innerWidth < breakpoint);
            useEffect(() => {
                const handler = () => setIsMobile(window.innerWidth < breakpoint);
                window.addEventListener('resize', handler);
                return () => window.removeEventListener('resize', handler);
            }, [breakpoint]);
            return isMobile;
        };

        /* ===================== CONTEXT ===================== */
        const Ctx = createContext(null);

        const AppProvider = ({ children }) => {
            const [nav, setNav] = useState({ page: "home" });
            const [navHistory, setNavHistory] = useState([{ page: "home" }]);
            const [navIdx, setNavIdx] = useState(0);
            const [currentTrack, setCurrentTrack] = useState(enrichTrack(TRACKS[0]));
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [volume, setVolume] = useState(() => { try { const v = parseFloat(localStorage.getItem("sp_volume")); return isNaN(v) ? 0.7 : v; } catch { return 0.7 } });
            const [isMuted, setIsMuted] = useState(() => { try { return localStorage.getItem("sp_muted") === "true"; } catch { return false } });
            const [shuffleOn, setShuffleOn] = useState(() => { try { return localStorage.getItem("sp_shuffle") === "true"; } catch { return false } });
            const [repeatMode, setRepeatModeState] = useState(() => { try { return localStorage.getItem("sp_repeat") || "off"; } catch { return "off" } });
            const [queue, setQueue] = useState([]);
            const [likedSongs, setLikedSongs] = useState(() => { try { return JSON.parse(localStorage.getItem("sp_likes") || '["t1","t6","t20","t29","t32"]') } catch { return [] } });
            const [followedArtists, setFollowed] = useState(() => { try { return JSON.parse(localStorage.getItem("sp_follows") || '["a1","a2","a9"]') } catch { return [] } });
            const [showQueue, setShowQueue] = useState(false);
            const [toasts, setToasts] = useState([]);
            const [contextMenu, setContextMenu] = useState(null);
            const [showCreatePl, setShowCreatePl] = useState(false);
            const [userPlaylists, setUserPlaylists] = useState(PLAYLISTS);
            const [spotifyCache, setSpotifyCache] = useState({ artists: {}, albums: {}, tracks: {} });
            const [recentlyPlayed, setRecentlyPlayed] = useState(() => { try { return JSON.parse(localStorage.getItem("sp_recent") || '[]') } catch { return [] } });
            const [showShortcuts, setShowShortcuts] = useState(false);
            const [mobileNowPlaying, setMobileNowPlaying] = useState(false);
            const [mobileSidebar, setMobileSidebar] = useState(false);

            const timerRef = useRef(null);
            const toastId = useRef(0);
            const audioRef = useRef(null);

            // Persist preferences
            useEffect(() => { localStorage.setItem("sp_likes", JSON.stringify(likedSongs)); }, [likedSongs]);
            useEffect(() => { localStorage.setItem("sp_follows", JSON.stringify(followedArtists)); }, [followedArtists]);
            useEffect(() => { localStorage.setItem("sp_volume", String(volume)); }, [volume]);
            useEffect(() => { localStorage.setItem("sp_muted", String(isMuted)); }, [isMuted]);
            useEffect(() => { localStorage.setItem("sp_shuffle", String(shuffleOn)); }, [shuffleOn]);
            useEffect(() => { localStorage.setItem("sp_repeat", repeatMode); }, [repeatMode]);
            useEffect(() => { localStorage.setItem("sp_recent", JSON.stringify(recentlyPlayed.slice(0, 20))); }, [recentlyPlayed]);

            // Audio element management
            useEffect(() => {
                if (!audioRef.current) {
                    audioRef.current = new Audio();
                    audioRef.current.volume = volume;
                }
            }, []);

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.volume = isMuted ? 0 : volume;
                }
            }, [volume, isMuted]);

            // Handle audio playback for preview tracks
            const isAudioPlaying = useRef(false);

            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;

                if (currentTrack?.previewUrl) {
                    if (audio.src !== currentTrack.previewUrl) {
                        audio.src = currentTrack.previewUrl;
                        audio.load();
                    }
                    if (isPlaying) {
                        audio.play().catch(() => { });
                        isAudioPlaying.current = true;
                    } else {
                        audio.pause();
                        isAudioPlaying.current = false;
                    }
                } else {
                    audio.pause();
                    audio.src = '';
                    isAudioPlaying.current = false;
                }
            }, [currentTrack?.previewUrl, currentTrack?.id, isPlaying]);

            // Audio time update
            useEffect(() => {
                const audio = audioRef.current;
                if (!audio || !currentTrack?.previewUrl) return;
                const onTimeUpdate = () => { setCurrentTime(audio.currentTime); };
                const onEnded = () => { setTimeout(() => playNext(), 0); };
                const onLoaded = () => {
                    // Use actual audio duration if available
                };
                audio.addEventListener('timeupdate', onTimeUpdate);
                audio.addEventListener('ended', onEnded);
                audio.addEventListener('loadedmetadata', onLoaded);
                return () => {
                    audio.removeEventListener('timeupdate', onTimeUpdate);
                    audio.removeEventListener('ended', onEnded);
                    audio.removeEventListener('loadedmetadata', onLoaded);
                };
            }, [currentTrack?.id, currentTrack?.previewUrl]);

            // Simulated playback timer for non-preview tracks
            useEffect(() => {
                if (currentTrack?.previewUrl) return; // Audio element handles it
                if (isPlaying && currentTrack) {
                    timerRef.current = setInterval(() => {
                        setCurrentTime(prev => {
                            if (prev >= currentTrack.duration - 1) { if (repeatMode === "one") return 0; setTimeout(() => playNext(), 0); return 0; }
                            return prev + 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [isPlaying, currentTrack, repeatMode]);

            const navigate = useCallback((page, id) => {
                const nn = { page, id };
                setNav(nn);
                setNavHistory(prev => { const next = [...prev.slice(0, navIdx + 1), nn]; setNavIdx(next.length - 1); return next; });
                setMobileSidebar(false);
            }, [navIdx]);

            const goBack = useCallback(() => { if (navIdx > 0) { setNavIdx(i => i - 1); setNav(navHistory[navIdx - 1]); } }, [navIdx, navHistory]);
            const goForward = useCallback(() => { if (navIdx < navHistory.length - 1) { setNavIdx(i => i + 1); setNav(navHistory[navIdx + 1]); } }, [navIdx, navHistory]);

            const playTrack = useCallback((track, trackList) => {
                const e = enrichTrack(track);
                setCurrentTrack(e); setCurrentTime(0); setIsPlaying(true);
                if (trackList) { const i = trackList.findIndex(t => t.id === track.id); setQueue(trackList.slice(i + 1).map(enrichTrack)); }
                // Add to recently played
                setRecentlyPlayed(prev => {
                    const entry = { type: track.albumId ? 'album' : 'track', id: track.albumId || track.id, timestamp: Date.now() };
                    const filtered = prev.filter(r => r.id !== entry.id);
                    return [entry, ...filtered].slice(0, 20);
                });
            }, []);

            const togglePlay = useCallback(() => setIsPlaying(p => !p), []);
            const playNext = useCallback(() => {
                if (queue.length > 0) {
                    const next = shuffleOn ? queue[Math.floor(Math.random() * queue.length)] : queue[0];
                    setCurrentTrack(next); setQueue(q => q.filter(t => t.id !== next.id)); setCurrentTime(0);
                } else if (repeatMode === "all") { setCurrentTime(0); } else { setIsPlaying(false); }
            }, [queue, shuffleOn, repeatMode]);

            const playPrev = useCallback(() => setCurrentTime(0), []);

            const seek = useCallback((t) => {
                setCurrentTime(t);
                if (audioRef.current && currentTrack?.previewUrl) {
                    audioRef.current.currentTime = t;
                }
            }, [currentTrack]);

            const addToast = useCallback((msg) => {
                const id = ++toastId.current;
                setToasts(prev => [...prev, { id, msg }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            }, []);

            const toggleLike = useCallback((trackId) => {
                setLikedSongs(prev => { const has = prev.includes(trackId); addToast(has ? "Removed from Liked Songs" : "Added to Liked Songs"); return has ? prev.filter(i => i !== trackId) : [...prev, trackId]; });
            }, []);

            const toggleFollow = useCallback((artistId) => {
                setFollowed(prev => { const has = prev.includes(artistId); addToast(has ? "Unfollowed" : "Following"); return has ? prev.filter(i => i !== artistId) : [...prev, artistId]; });
            }, []);

            const addToQueue = useCallback((track) => { setQueue(q => [...q, enrichTrack(track)]); addToast("Added to queue"); }, []);
            const cycleRepeat = useCallback(() => setRepeatModeState(m => m === "off" ? "all" : m === "all" ? "one" : "off"), []);

            const createPlaylist = useCallback((name) => {
                const pl = { id: "pl_" + Date.now(), name, description: "", cover: `https://picsum.photos/seed/${Date.now()}/300`, owner: "You", isLikedSongs: false, trackIds: [], followers: 0, isPublic: true };
                setUserPlaylists(prev => [...prev, pl]); addToast("Playlist created"); setShowCreatePl(false);
            }, []);

            const addToPlaylist = useCallback((trackId, playlistId) => {
                setUserPlaylists(prev => prev.map(pl => {
                    if (pl.id === playlistId && !pl.trackIds.includes(trackId)) {
                        addToast(`Added to ${pl.name}`);
                        return { ...pl, trackIds: [...pl.trackIds, trackId] };
                    }
                    return pl;
                }));
            }, []);

            const cacheSpotifyData = useCallback((type, id, data) => {
                setSpotifyCache(prev => ({ ...prev, [type]: { ...prev[type], [id]: data } }));
            }, []);

            useEffect(() => {
                const hk = (e) => {
                    if (e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement) return;
                    if (e.code === "Space") { e.preventDefault(); togglePlay(); }
                    if (e.code === "ArrowRight") { e.preventDefault(); seek(Math.min(currentTime + 10, currentTrack?.duration || 0)); }
                    if (e.code === "ArrowLeft") { e.preventDefault(); seek(Math.max(currentTime - 10, 0)); }
                    if (e.code === "ArrowUp") { e.preventDefault(); setVolume(v => Math.min(v + 0.1, 1)); }
                    if (e.code === "ArrowDown") { e.preventDefault(); setVolume(v => Math.max(v - 0.1, 0)); }
                    if (e.key === "?" && e.shiftKey) { e.preventDefault(); setShowShortcuts(s => !s); }
                };
                window.addEventListener("keydown", hk);
                return () => window.removeEventListener("keydown", hk);
            }, [currentTime, currentTrack]);

            const value = useMemo(() => ({
                nav, navigate, goBack, goForward, navIdx, navHistory,
                currentTrack, isPlaying, currentTime, volume, isMuted, shuffleOn, repeatMode, queue,
                playTrack, togglePlay, playNext, playPrev, seek, setVolume, setIsMuted, setShuffleOn,
                cycleRepeat, likedSongs, toggleLike, followedArtists, toggleFollow,
                showQueue, setShowQueue, toasts, addToast, contextMenu, setContextMenu,
                showCreatePl, setShowCreatePl, userPlaylists, createPlaylist, addToQueue,
                spotifyCache, cacheSpotifyData, recentlyPlayed,
                showShortcuts, setShowShortcuts, addToPlaylist,
                mobileNowPlaying, setMobileNowPlaying, mobileSidebar, setMobileSidebar,
                audioRef,
            }),
                [nav, currentTrack, isPlaying, currentTime, volume, isMuted, shuffleOn, repeatMode, queue,
                    likedSongs, followedArtists, showQueue, toasts, contextMenu, showCreatePl, userPlaylists,
                    navIdx, navHistory, spotifyCache, recentlyPlayed, showShortcuts, mobileNowPlaying, mobileSidebar]);

            return <Ctx.Provider value={value}>{children}</Ctx.Provider>;
        };

        const useApp = () => useContext(Ctx);

        /* ===================== EQUALIZER BARS ===================== */
        const EqBars = () => (
            <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 14 }}>
                {[1, 2, 3].map(i => (
                    <span key={i} style={{
                        display: "inline-block", width: 3, borderRadius: 2, background: "#1DB954",
                        animation: `eq${i} 0.9s ease-in-out infinite`, animationDelay: i === 2 ? "0.15s" : i === 3 ? "0.3s" : "0s",
                    }} />
                ))}
            </div>
        );

        /* ===================== SKELETON CARD ===================== */
        const SkeletonCard = () => (
            <div style={{ padding: 16, borderRadius: 8, background: "#181818" }}>
                <div className="skeleton" style={{ width: "100%", aspectRatio: "1", marginBottom: 12 }} />
                <div className="skeleton" style={{ width: "80%", height: 14, marginBottom: 8 }} />
                <div className="skeleton" style={{ width: "60%", height: 12 }} />
            </div>
        );

        /* ===================== CUSTOM SLIDER ===================== */
        const Slider = ({ value, max, onChange, accent = "#1DB954" }) => {
            const ref = useRef(null);
            const [drag, setDrag] = useState(false);
            const [hov, setHov] = useState(false);
            const pct = max > 0 ? (value / max) * 100 : 0;

            const calc = useCallback((clientX) => {
                if (!ref.current) return;
                const r = ref.current.getBoundingClientRect();
                onChange(Math.max(0, Math.min(clientX - r.left, r.width)) / r.width * max);
            }, [max, onChange]);

            useEffect(() => {
                if (!drag) return;
                const mv = (e) => calc(e.clientX);
                const tmv = (e) => { if (e.touches[0]) calc(e.touches[0].clientX); };
                const up = () => setDrag(false);
                window.addEventListener("mousemove", mv);
                window.addEventListener("mouseup", up);
                window.addEventListener("touchmove", tmv, { passive: false });
                window.addEventListener("touchend", up);
                return () => {
                    window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up);
                    window.removeEventListener("touchmove", tmv); window.removeEventListener("touchend", up);
                };
            }, [drag, calc]);

            return (
                <div ref={ref}
                    style={{ position: "relative", height: 12, display: "flex", alignItems: "center", cursor: "pointer", flex: 1 }}
                    onMouseDown={(e) => { setDrag(true); calc(e.clientX); }}
                    onTouchStart={(e) => { setDrag(true); if (e.touches[0]) calc(e.touches[0].clientX); }}
                    onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
                    <div style={{ width: "100%", height: hov || drag ? 5 : 3, borderRadius: 3, backgroundColor: "#4d4d4d", transition: "height 0.1s", position: "relative" }}>
                        <div style={{ width: `${pct}%`, height: "100%", borderRadius: 3, backgroundColor: hov || drag ? accent : "#fff", transition: "background 0.1s" }} />
                    </div>
                    {(hov || drag) && (
                        <div style={{ position: "absolute", left: `calc(${pct}% - 6px)`, width: 12, height: 12, borderRadius: "50%", background: "#fff", boxShadow: "0 2px 8px rgba(0,0,0,0.4)" }} />
                    )}
                </div>
            );
        };

        /* ===================== TOASTS ===================== */
        const Toasts = () => {
            const { toasts } = useApp();
            const isMobile = useIsMobile();
            return (
                <div style={{ position: "fixed", bottom: isMobile ? 170 : 106, left: "50%", transform: "translateX(-50%)", zIndex: 9999, display: "flex", flexDirection: "column", gap: 8, pointerEvents: "none" }}>
                    {toasts.map(t => (
                        <div key={t.id} className="animate-toastIn" style={{
                            background: "#242424", color: "#fff", border: "1px solid #727272",
                            padding: "12px 24px", borderRadius: 4, fontSize: 14, fontWeight: 600,
                            whiteSpace: "nowrap", textAlign: "center",
                        }}>{t.msg}</div>
                    ))}
                </div>
            );
        };

        /* ===================== CONTEXT MENU ===================== */
        const ContextMenuComp = () => {
            const { contextMenu, setContextMenu, toggleLike, likedSongs, addToQueue, navigate, userPlaylists, addToPlaylist } = useApp();
            const ref = useRef(null);
            const [showPlaylistSub, setShowPlaylistSub] = useState(false);

            useEffect(() => {
                const hnd = (e) => { if (ref.current && !ref.current.contains(e.target)) setContextMenu(null); };
                const esc = (e) => { if (e.key === "Escape") setContextMenu(null); };
                document.addEventListener("mousedown", hnd); document.addEventListener("keydown", esc);
                return () => { document.removeEventListener("mousedown", hnd); document.removeEventListener("keydown", esc); };
            }, []);

            if (!contextMenu) return null;
            const { x, y, track } = contextMenu;
            const liked = likedSongs.includes(track?.id);
            const items = [
                { label: "Add to queue", action: () => { addToQueue(track); setContextMenu(null); } },
                { label: "Add to playlist", action: () => setShowPlaylistSub(s => !s), submenu: true },
                { divider: true },
                { label: "Go to artist", action: () => { navigate("artist", track.artistId); setContextMenu(null); } },
                { label: "Go to album", action: () => { navigate("album", track.albumId); setContextMenu(null); } },
                { divider: true },
                { label: liked ? "Remove from Liked Songs" : "Save to Liked Songs", action: () => { toggleLike(track.id); setContextMenu(null); } },
                { divider: true },
                { label: "Share", action: () => { navigator.clipboard?.writeText(window.location.href); setContextMenu(null); } },
            ];

            const editablePlaylists = userPlaylists.filter(p => !p.isLikedSongs && (p.owner === "You" || p.owner === "John Doe"));

            return (
                <div ref={ref} className="animate-fadeIn" style={{
                    position: "fixed", left: Math.min(x, window.innerWidth - 224), top: Math.min(y, window.innerHeight - 300),
                    width: 220, background: "#282828", borderRadius: 4, boxShadow: "0 16px 24px rgba(0,0,0,0.5)",
                    zIndex: 9998, padding: "4px 0",
                }}>
                    {items.map((item, i) =>
                        item.divider ? <div key={i} style={{ height: 1, background: "#3e3e3e", margin: "4px 0" }} /> :
                            <div key={i} style={{ position: "relative" }}>
                                <button onClick={item.action} style={{
                                    width: "100%", textAlign: "left", padding: "10px 14px", fontSize: 14, color: "#fff",
                                    background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, justifyContent: "space-between",
                                }}
                                    onMouseEnter={e => e.currentTarget.style.background = "#3e3e3e"}
                                    onMouseLeave={e => e.currentTarget.style.background = "none"}>
                                    <span>{item.label}</span>
                                    {item.submenu && <IcoCRight sz={14} />}
                                </button>
                                {item.submenu && showPlaylistSub && (
                                    <div style={{ position: "absolute", left: "100%", top: 0, width: 200, background: "#282828", borderRadius: 4, boxShadow: "0 8px 16px rgba(0,0,0,0.5)", padding: "4px 0", zIndex: 9999 }}>
                                        {editablePlaylists.map(pl => (
                                            <button key={pl.id} onClick={() => { addToPlaylist(track.id, pl.id); setContextMenu(null); }}
                                                style={{ width: "100%", textAlign: "left", padding: "8px 14px", fontSize: 13, color: "#fff", background: "none", border: "none", cursor: "pointer" }}
                                                onMouseEnter={e => e.currentTarget.style.background = "#3e3e3e"}
                                                onMouseLeave={e => e.currentTarget.style.background = "none"}>
                                                {pl.name}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                    )}
                </div>
            );
        };

        /* ===================== KEYBOARD SHORTCUTS MODAL ===================== */
        const ShortcutsModal = () => {
            const { showShortcuts, setShowShortcuts } = useApp();
            if (!showShortcuts) return null;
            const shortcuts = [
                { key: "Space", desc: "Play / Pause" },
                { key: "→", desc: "Seek forward 10s" },
                { key: "←", desc: "Seek back 10s" },
                { key: "↑", desc: "Volume up" },
                { key: "↓", desc: "Volume down" },
                { key: "?", desc: "Show this help" },
            ];
            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 9990, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.75)" }}
                    onClick={() => setShowShortcuts(false)}>
                    <div style={{ background: "#282828", borderRadius: 8, padding: 32, width: 400, maxWidth: "90vw" }} onClick={e => e.stopPropagation()}>
                        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#fff", marginBottom: 24 }}>Keyboard Shortcuts</h2>
                        {shortcuts.map(s => (
                            <div key={s.key} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #3e3e3e" }}>
                                <span style={{ color: "#fff", fontSize: 14 }}>{s.desc}</span>
                                <kbd style={{ background: "#3e3e3e", color: "#fff", padding: "2px 8px", borderRadius: 4, fontSize: 13, fontFamily: "monospace" }}>{s.key}</kbd>
                            </div>
                        ))}
                        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 24 }}>
                            <button onClick={() => setShowShortcuts(false)} style={{ padding: "10px 24px", borderRadius: 100, background: "#1DB954", border: "none", color: "#000", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Got it</button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ===================== CREATE PLAYLIST MODAL ===================== */
        const CreatePlaylistModal = () => {
            const { showCreatePl, setShowCreatePl, createPlaylist } = useApp();
            const [name, setName] = useState("");
            if (!showCreatePl) return null;
            return (
                <div style={{ position: "fixed", inset: 0, zIndex: 9990, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.75)" }}
                    onClick={() => setShowCreatePl(false)}>
                    <div style={{ background: "#282828", borderRadius: 8, padding: 32, width: 400, maxWidth: "90vw" }} onClick={e => e.stopPropagation()}>
                        <h2 style={{ fontSize: 24, fontWeight: 700, color: "#fff", marginBottom: 24 }}>Create a playlist</h2>
                        <input value={name} onChange={e => setName(e.target.value)} placeholder="Add a name"
                            style={{ width: "100%", padding: "12px 16px", borderRadius: 4, background: "#3e3e3e", color: "#fff", fontSize: 14, border: "none", outline: "none", marginBottom: 24 }}
                            onKeyDown={e => { if (e.key === "Enter" && name.trim()) createPlaylist(name.trim()); }} autoFocus />
                        <div style={{ display: "flex", justifyContent: "flex-end", gap: 12 }}>
                            <button onClick={() => setShowCreatePl(false)} style={{ padding: "10px 24px", borderRadius: 100, background: "none", border: "none", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Cancel</button>
                            <button onClick={() => name.trim() && createPlaylist(name.trim())} style={{ padding: "10px 24px", borderRadius: 100, background: "#1DB954", border: "none", color: "#000", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Create</button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ===================== CARD ===================== */
        const Card = memo(({ item, type, onClick }) => {
            const { playTrack, navigate } = useApp();
            const [hov, setHov] = useState(false);

            const handlePlay = (e) => {
                e.stopPropagation();
                if (type === "track") playTrack(item);
                else if (type === "playlist") { const ts = (item.trackIds || []).map(getTrack).filter(Boolean); if (ts.length) playTrack(ts[0], ts); }
                else if (type === "album") { const ts = tracksForAlbum(item.id); if (ts.length) playTrack(ts[0], ts); }
                else if (type === "artist") { const ts = tracksForArtist(item.id); if (ts.length) playTrack(ts[0], ts); }
            };

            const artistName = type === "album" ? (item.artistName || getArtist(item.artistId)?.name || "") : "";

            return (
                <div className="card-wrap"
                    style={{ padding: 16, borderRadius: 8, background: hov ? "#282828" : "#181818", cursor: "pointer", transition: "background 0.2s", position: "relative" }}
                    onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                    onClick={() => onClick?.(item)}>
                    <div style={{ position: "relative", marginBottom: 12 }}>
                        <img src={item.cover || item.image || "https://picsum.photos/seed/default/300"} alt={item.name || item.title}
                            style={{ width: "100%", aspectRatio: "1", objectFit: "cover", borderRadius: type === "artist" ? "50%" : 6, display: "block", boxShadow: "0 4px 16px rgba(0,0,0,0.4)" }} />
                        <button className="card-play-btn" onClick={handlePlay}>
                            <IcoPlay sz={18} fill="black" col="black" />
                        </button>
                    </div>
                    <p style={{ fontSize: 14, fontWeight: 700, color: "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 4 }}>{item.name || item.title}</p>
                    <p style={{ fontSize: 13, color: "#A7A7A7", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>
                        {type === "artist" ? "Artist" :
                            type === "album" ? artistName :
                                type === "playlist" ? (item.description || `By ${item.owner}`) :
                                    item.artistName || getArtist(item.artistId)?.name || ""}
                    </p>
                </div>
            );
        });

        /* ===================== QUICK CARD ===================== */
        const QuickCard = ({ item, onClick }) => {
            const { playTrack } = useApp();
            const [hov, setHov] = useState(false);
            return (
                <div className="quick-card" style={{
                    display: "flex", alignItems: "center", background: hov ? "#3e3e3e" : "#2a2a2a",
                    borderRadius: 4, overflow: "hidden", cursor: "pointer", height: 56, position: "relative",
                    transition: "background 0.1s",
                }}
                    onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                    onClick={() => onClick?.(item)}>
                    {item.isLikedSongs ? (
                        <div style={{ width: 56, height: 56, background: "linear-gradient(135deg,#450af5,#c4efd9)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            <IcoHeart sz={22} fill="white" col="white" />
                        </div>
                    ) : (
                        <img src={item.cover || "https://picsum.photos/seed/pl/300"} alt="" style={{ width: 56, height: 56, objectFit: "cover", flexShrink: 0 }} />
                    )}
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#fff", flex: 1, padding: "0 12px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.name}</span>
                    <button className="quick-play-btn" onClick={e => { e.stopPropagation(); const ts = (item.trackIds || []).map(getTrack).filter(Boolean); if (ts.length) playTrack(ts[0], ts); }}>
                        <IcoPlay sz={16} fill="black" col="black" />
                    </button>
                </div>
            );
        };

        /* ===================== TRACK ROW ===================== */
        const TrackRow = memo(({ track, index, showAlbum = true, showDate = false, onPlay }) => {
            const { currentTrack, isPlaying, toggleLike, likedSongs, setContextMenu, navigate } = useApp();
            const [hov, setHov] = useState(false);
            const isMobile = useIsMobile();
            const isCurrent = currentTrack?.id === track.id;
            const liked = likedSongs.includes(track.id);
            const artist = track.isSpotify ? null : getArtist(track.artistId);
            const artistName = track.artistName || artist?.name || '';
            const albumTitle = track.albumTitle || getAlbum(track.albumId)?.title || '';

            const effectiveShowAlbum = showAlbum && !isMobile;
            const effectiveShowDate = showDate && !isMobile;

            const cols = effectiveShowAlbum && effectiveShowDate ? "40px 4fr 3fr 2fr 40px 50px" :
                effectiveShowAlbum ? "40px 4fr 3fr 40px 50px" :
                    "40px 4fr 40px 50px";

            return (
                <div style={{
                    display: "grid", gridTemplateColumns: cols, gap: 8, padding: "4px 8px", borderRadius: 4, cursor: "pointer", alignItems: "center", height: 56,
                    background: hov ? "rgba(255,255,255,0.07)" : "transparent", transition: "background 0.1s"
                }}
                    onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                    onDoubleClick={() => onPlay?.(track)}
                    onContextMenu={e => { e.preventDefault(); setContextMenu({ x: e.clientX, y: e.clientY, track }); }}>
                    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", width: 40 }}>
                        {hov ? (
                            <button onClick={() => onPlay?.(track)} style={{ background: "none", border: "none", cursor: "pointer", color: "#fff", display: "flex" }}>
                                <IcoPlay sz={14} fill="white" col="white" />
                            </button>
                        ) : isCurrent && isPlaying ? <EqBars />
                            : <span style={{ fontSize: 14, color: isCurrent ? "#1DB954" : "#A7A7A7" }}>{index + 1}</span>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0, paddingLeft: 8 }}>
                        <img src={track.cover} alt="" style={{ width: 40, height: 40, borderRadius: 4, objectFit: "cover", flexShrink: 0 }} />
                        <div style={{ minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                <p style={{ fontSize: 14, fontWeight: 500, color: isCurrent ? "#1DB954" : "#fff", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{track.title}</p>
                                {track.previewUrl && <span style={{ fontSize: 9, background: "#1DB954", color: "#000", padding: "1px 4px", borderRadius: 2, fontWeight: 700, flexShrink: 0 }}>30s</span>}
                            </div>
                            <p style={{ fontSize: 12, color: "#A7A7A7", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                {track.explicit && <span style={{ display: "inline-block", padding: "0 4px", marginRight: 6, fontSize: 9, background: "#A7A7A7", color: "#000", borderRadius: 2, fontWeight: 700 }}>E</span>}
                                <span style={{ cursor: "pointer" }}
                                    onClick={e => { e.stopPropagation(); navigate("artist", track.artistId); }}
                                    onMouseEnter={e => e.target.style.textDecoration = "underline"} onMouseLeave={e => e.target.style.textDecoration = ""}>
                                    {artistName}
                                </span>
                            </p>
                        </div>
                    </div>
                    {effectiveShowAlbum && (
                        <span style={{ fontSize: 14, color: "#A7A7A7", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }}
                            onClick={e => { e.stopPropagation(); navigate("album", track.albumId); }}
                            onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                            onMouseLeave={e => e.currentTarget.style.textDecoration = ""}>
                            {albumTitle}
                        </span>
                    )}
                    {effectiveShowDate && (
                        <span style={{ fontSize: 14, color: "#A7A7A7" }}>
                            {new Date(Date.now() - Math.random() * 1e10).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                        </span>
                    )}
                    <div style={{ display: "flex", justifyContent: "center" }}>
                        {(hov || liked) && (
                            <button onClick={e => { e.stopPropagation(); toggleLike(track.id); }}
                                style={{ background: "none", border: "none", cursor: "pointer", display: "flex", transition: "transform 0.1s" }}
                                onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
                                onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                                <IcoHeart sz={16} fill={liked ? "#1DB954" : "none"} col={liked ? "#1DB954" : "#A7A7A7"} />
                            </button>
                        )}
                    </div>
                    <span style={{ fontSize: 14, color: "#A7A7A7", textAlign: "right" }}>{fmtTime(track.duration)}</span>
                </div>
            );
        });

        /* ===================== SCROLL SECTION ===================== */
        const ScrollSection = ({ title, items, type, onSeeAll, loading }) => {
            const { navigate } = useApp();
            const isMobile = useIsMobile();
            const handleClick = (item) => {
                if (type === "artist") navigate("artist", item.id);
                else if (type === "album") navigate("album", item.id);
                else if (type === "playlist") navigate("playlist", item.id);
            };
            return (
                <section style={{ marginBottom: 32 }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                        <h2 style={{ fontSize: 22, fontWeight: 800, color: "#fff", cursor: "pointer" }}
                            onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                            onMouseLeave={e => e.currentTarget.style.textDecoration = ""}>{title}</h2>
                        {onSeeAll && <button onClick={onSeeAll} style={{ fontSize: 12, fontWeight: 700, color: "#A7A7A7", background: "none", border: "none", cursor: "pointer", textTransform: "uppercase", letterSpacing: 1 }}
                            onMouseEnter={e => { e.currentTarget.style.textDecoration = "underline"; e.currentTarget.style.color = "#fff"; }}
                            onMouseLeave={e => { e.currentTarget.style.textDecoration = ""; e.currentTarget.style.color = "#A7A7A7"; }}>Show all</button>}
                    </div>
                    <div className="scrollbar-hide" style={{ display: "flex", gap: 12, overflowX: "auto", paddingBottom: 8 }}>
                        {loading ? [1, 2, 3, 4, 5].map(i => (
                            <div key={i} style={{ flexShrink: 0, width: isMobile ? 150 : 180 }}><SkeletonCard /></div>
                        )) : items.map(item => (
                            <div key={item.id} style={{ flexShrink: 0, width: isMobile ? 150 : 180 }}>
                                <Card item={item} type={type} onClick={handleClick} />
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        /* ===================== TRACK TABLE HEADER ===================== */
        const TrackTableHeader = ({ showAlbum, showDate }) => {
            const isMobile = useIsMobile();
            const effectiveShowAlbum = showAlbum && !isMobile;
            const effectiveShowDate = showDate && !isMobile;
            const cols = effectiveShowAlbum && effectiveShowDate ? "40px 4fr 3fr 2fr 40px 50px" :
                effectiveShowAlbum ? "40px 4fr 3fr 40px 50px" : "40px 4fr 40px 50px";
            return (
                <div style={{ display: "grid", gridTemplateColumns: cols, gap: 8, padding: "0 8px 8px", borderBottom: "1px solid #282828", marginBottom: 8 }}>
                    <span style={{ fontSize: 12, color: "#A7A7A7", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, textAlign: "center" }}>#</span>
                    <span style={{ fontSize: 12, color: "#A7A7A7", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, paddingLeft: 8 }}>Title</span>
                    {effectiveShowAlbum && <span style={{ fontSize: 12, color: "#A7A7A7", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Album</span>}
                    {effectiveShowDate && <span style={{ fontSize: 12, color: "#A7A7A7", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1 }}>Date added</span>}
                    <span></span>
                    <IcoClock sz={14} col="#A7A7A7" style={{ justifySelf: "flex-end" }} />
                </div>
            );
        };

        /* ===================== SIDEBAR ===================== */
        const Sidebar = ({ overlay = false, onClose }) => {
            const { nav, navigate, setShowCreatePl, userPlaylists, likedSongs, followedArtists } = useApp();
            const [libFilter, setLibFilter] = useState("all");
            const [searchLib, setSearchLib] = useState("");
            const filters = ["all", "Playlists", "Artists"];

            const libraryItems = useMemo(() => {
                let items = [];
                if (libFilter === "all" || libFilter === "Playlists") items = [...items, ...userPlaylists.map(p => ({ ...p, type: "playlist" }))];
                if (libFilter === "all" || libFilter === "Artists") items = [...items, ...followedArtists.map(id => { const a = getArtist(id); return a ? { ...a, type: "artist" } : null; }).filter(Boolean)];
                if (searchLib) items = items.filter(i => (i.name || i.title || "").toLowerCase().includes(searchLib.toLowerCase()));
                return items;
            }, [libFilter, searchLib, userPlaylists, followedArtists]);

            const handleNav = (page, id) => {
                navigate(page, id);
                if (onClose) onClose();
            };

            return (
                <div style={{ display: "flex", flexDirection: "column", height: "100%", gap: 8, flexShrink: 0, width: overlay ? "100%" : 300 }}>
                    {overlay && (
                        <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 16px" }}>
                            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#fff" }}><IcoX sz={24} /></button>
                        </div>
                    )}
                    <div style={{ background: "#121212", borderRadius: 8, padding: 8 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px 16px", cursor: "pointer" }} onClick={() => handleNav("home")}>
                            <SpotifyLogo />
                            <span style={{ color: "#fff", fontSize: "1.3rem", fontWeight: 800, letterSpacing: "-0.5px" }}>Spotify</span>
                        </div>
                        {[
                            { page: "home", label: "Home", icon: <IcoHome sz={24} fill={nav.page === "home" ? "white" : "none"} col={nav.page === "home" ? "white" : "#A7A7A7"} /> },
                            { page: "search", label: "Search", icon: <IcoSearch sz={24} col={nav.page === "search" ? "white" : "#A7A7A7"} /> },
                        ].map(({ page, label, icon }) => (
                            <button key={page} onClick={() => handleNav(page)} style={{
                                display: "flex", alignItems: "center", gap: 16, width: "100%", padding: "8px 16px", borderRadius: 4,
                                background: "none", border: "none", cursor: "pointer", fontWeight: 700, fontSize: 14,
                                color: nav.page === page ? "#fff" : "#A7A7A7", transition: "color 0.1s",
                            }}
                                onMouseEnter={e => { if (nav.page !== page) e.currentTarget.style.color = "#fff"; }}
                                onMouseLeave={e => { if (nav.page !== page) e.currentTarget.style.color = "#A7A7A7"; }}>
                                {icon}{label}
                            </button>
                        ))}
                    </div>
                    <div style={{ background: "#121212", borderRadius: 8, display: "flex", flexDirection: "column", flex: 1, minHeight: 0 }}>
                        <div style={{ padding: "12px 16px 8px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <button style={{ display: "flex", alignItems: "center", gap: 8, background: "none", border: "none", cursor: "pointer", color: "#A7A7A7", fontWeight: 700, fontSize: 14 }}
                                onMouseEnter={e => e.currentTarget.style.color = "#fff"} onMouseLeave={e => e.currentTarget.style.color = "#A7A7A7"}>
                                <IcoLib sz={24} col="currentColor" fill="currentColor" />Your Library
                            </button>
                            <button onClick={() => setShowCreatePl(true)} style={{ width: 32, height: 32, borderRadius: "50%", background: "none", border: "none", cursor: "pointer", color: "#A7A7A7", display: "flex", alignItems: "center", justifyContent: "center" }}
                                onMouseEnter={e => { e.currentTarget.style.background = "#1a1a1a"; e.currentTarget.style.color = "#fff"; }}
                                onMouseLeave={e => { e.currentTarget.style.background = "none"; e.currentTarget.style.color = "#A7A7A7"; }}>
                                <IcoPlus sz={18} />
                            </button>
                        </div>
                        <div className="scrollbar-hide" style={{ display: "flex", gap: 6, padding: "0 8px 10px", overflowX: "auto" }}>
                            {filters.map(f => (
                                <button key={f} onClick={() => setLibFilter(f === libFilter ? "all" : f)} style={{
                                    padding: "5px 14px", borderRadius: 100, fontSize: 13, fontWeight: 600, cursor: "pointer", border: "none",
                                    background: f === libFilter ? "#fff" : "#2a2a2a", color: f === libFilter ? "#000" : "#fff",
                                    transition: "background 0.15s", whiteSpace: "nowrap", fontFamily: "inherit",
                                }}>{f === "all" ? "All" : f}</button>
                            ))}
                        </div>
                        <div style={{ padding: "0 8px 8px" }}>
                            <div style={{ position: "relative" }}>
                                <IcoSearch sz={14} col="#A7A7A7" style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)" }} />
                                <input value={searchLib} onChange={e => setSearchLib(e.target.value)} placeholder="Search in Your Library"
                                    style={{ width: "100%", background: "#2a2a2a", color: "#fff", fontSize: 12, padding: "6px 8px 6px 28px", borderRadius: 4, border: "none", outline: "none" }} />
                            </div>
                        </div>
                        <div style={{ flex: 1, overflowY: "auto", padding: "0 8px 8px", scrollbarWidth: "thin", scrollbarColor: "#535353 transparent" }}>
                            {libraryItems.map(item => (
                                <button key={item.id} onClick={() => {
                                    if (item.isLikedSongs) handleNav("liked");
                                    else if (item.type === "playlist") handleNav("playlist", item.id);
                                    else if (item.type === "artist") handleNav("artist", item.id);
                                }} style={{
                                    display: "flex", alignItems: "center", gap: 12, width: "100%", padding: 8, borderRadius: 4,
                                    background: "none", border: "none", cursor: "pointer", transition: "background 0.1s",
                                }}
                                    onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.07)"}
                                    onMouseLeave={e => e.currentTarget.style.background = "none"}>
                                    {item.isLikedSongs ? (
                                        <div style={{ width: 48, height: 48, borderRadius: 4, background: "linear-gradient(135deg,#450af5,#c4efd9)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                            <IcoHeart sz={16} fill="white" col="white" />
                                        </div>
                                    ) : (
                                        <img src={item.cover || item.image || "https://picsum.photos/seed/def/300"} alt=""
                                            style={{ width: 48, height: 48, objectFit: "cover", flexShrink: 0, borderRadius: item.type === "artist" ? "50%" : 4 }} />
                                    )}
                                    <div style={{ minWidth: 0, textAlign: "left" }}>
                                        <p style={{
                                            fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                                            color: (item.isLikedSongs && nav.page === "liked") || (nav.id === item.id) ? "#1DB954" : "#fff"
                                        }}>
                                            {item.name || item.title}
                                        </p>
                                        <p style={{ fontSize: 12, color: "#A7A7A7", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                            {item.isLikedSongs ? `Playlist • ${likedSongs.length} songs` :
                                                item.type === "playlist" ? `Playlist • ${item.owner}` : "Artist"}
                                        </p>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        /* ===================== HEADER ===================== */
        const Header = ({ scrolled = false }) => {
            const { goBack, goForward, navIdx, navHistory, setMobileSidebar } = useApp();
            const [showProfile, setShowProfile] = useState(false);
            const isMobile = useIsMobile();
            return (
                <div style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: isMobile ? "12px 16px" : "16px 24px", position: "sticky", top: 0, zIndex: 20,
                    background: scrolled ? "rgba(18,18,18,0.95)" : "transparent",
                    backdropFilter: scrolled ? "blur(20px)" : "none", transition: "background 0.3s",
                }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        {isMobile && (
                            <button className="mobile-hamburger" onClick={() => setMobileSidebar(true)} style={{
                                width: 32, height: 32, borderRadius: "50%", background: "rgba(0,0,0,0.7)", border: "none",
                                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", marginRight: 4,
                            }}><IcoMenu sz={18} col="white" /></button>
                        )}
                        {[{ fn: goBack, dis: navIdx === 0, icon: <IcoCLeft sz={18} col="white" /> },
                        { fn: goForward, dis: navIdx >= navHistory.length - 1, icon: <IcoCRight sz={18} col="white" /> }].map(({ fn, dis, icon }, i) => (
                            <button key={i} onClick={fn} disabled={dis} style={{
                                width: 32, height: 32, borderRadius: "50%", background: "rgba(0,0,0,0.7)", border: "none",
                                cursor: dis ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                                opacity: dis ? 0.3 : 1, transition: "opacity 0.1s, background 0.1s",
                            }}
                                onMouseEnter={e => { if (!dis) e.currentTarget.style.background = "rgba(0,0,0,0.9)"; }}
                                onMouseLeave={e => e.currentTarget.style.background = "rgba(0,0,0,0.7)"}>
                                {icon}
                            </button>
                        ))}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, position: "relative" }}>
                        {!isMobile && <button style={{ width: 32, height: 32, borderRadius: "50%", background: "rgba(0,0,0,0.7)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: "#A7A7A7" }}
                            onMouseEnter={e => e.currentTarget.style.color = "#fff"} onMouseLeave={e => e.currentTarget.style.color = "#A7A7A7"}>
                            <IcoBell sz={16} />
                        </button>}
                        <button onClick={() => setShowProfile(!showProfile)} style={{ width: 32, height: 32, borderRadius: "50%", background: "#1DB954", border: "none", cursor: "pointer", color: "#000", fontWeight: 700, fontSize: 13 }}>J</button>
                        {showProfile && (
                            <div className="animate-fadeIn" style={{ position: "absolute", right: 0, top: "calc(100% + 8px)", width: 192, background: "#282828", borderRadius: 4, boxShadow: "0 16px 24px rgba(0,0,0,0.5)", padding: "4px 0", zIndex: 50 }}>

                                        onClick={() => navigate("artist", album.artistId || artist?.id)}
                                        onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                                        onMouseLeave={e => e.currentTarget.style.textDecoration = ""}>{album.artistName || artist?.name}</span>
                                    <span style={{ color: "rgba(255,255,255,0.5)" }}>•</span>
                                    <span style={{ fontSize: 14, color: "rgba(255,255,255,0.7)" }}>{album.year}</span>
                                    <span style={{ color: "rgba(255,255,255,0.5)" }}>•</span>
                                    <span style={{ fontSize: 14, color: "rgba(255,255,255,0.7)" }}>{tracks.length} songs</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style={{ padding: isMobile ? "24px 16px 8px" : "24px 24px 8px", display: "flex", alignItems: "center", gap: 24 }}>
                        <button className="big-play-btn" onClick={() => tracks.length > 0 && playTrack(tracks[0], tracks)}>
                            <IcoPlay sz={24} fill="black" col="black" />
                        </button>
                    </div>
                    <div style={{ padding: isMobile ? "0 16px" : "0 24px" }}>
                        <TrackTableHeader showAlbum={false} />
                        {tracks.map((t, i) => (<TrackRow key={t.id + i} track={t} index={i} showAlbum={false} onPlay={tr => playTrack(tr, tracks)} />))}
                    </div>
                    {(album.copyright || album.label) && (
                        <div style={{ padding: "24px", color: "#A7A7A7", fontSize: 13 }}>
                            <p style={{ fontWeight: 700, marginBottom: 4 }}>{album.year}</p>
                            {album.copyright && <p>{album.copyright}</p>}
                            {album.label && <p>{album.label}</p>}
                        </div>
                    )}
                </div>
            );
        };

        /* ===================== APP ===================== */
        function SpotifyApp() {
            const renderPage = (nav) => {
                switch (nav.page) {
                    case "search": return <SearchPage key="search" />;
                    case "playlist": return <PlaylistPage key={nav.id} playlistId={nav.id || "pl2"} />;
                    case "artist": return <ArtistPage key={nav.id} artistId={nav.id || "a1"} />;
                    case "album": return <AlbumPage key={nav.id} albumId={nav.id || "al1"} />;
                    case "liked": return <LikedSongsPage key="liked" />;
                    default: return <HomePage key="home" />;
                }
            };
            return (
                <AppProvider>
                    <AppInner renderPage={renderPage} />
                </AppProvider>
            );
        }

        function AppInner({ renderPage }) {
            const { nav, mobileNowPlaying, setMobileNowPlaying, mobileSidebar, setMobileSidebar } = useApp();
            const isMobile = useIsMobile();
            const [pageKey, setPageKey] = useState(0);

            useEffect(() => {
                setPageKey(k => k + 1);
            }, [nav]);

            return (
                <div style={{
                    display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden",
                    background: "#000", fontFamily: "'Circular Std',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",
                    paddingBottom: isMobile ? 56 : 0,
                }}>
                    <div style={{ display: "flex", flex: 1, gap: 8, padding: 8, overflow: "hidden" }}>
                        {!isMobile && <div className="desktop-sidebar"><Sidebar /></div>}
                        <div key={pageKey} className="animate-pageFade" style={{ flex: 1, display: "flex", overflow: "hidden" }}>
                            {renderPage(nav)}
                        </div>
                        <QueuePanel />
                    </div>
                    <PlayerBar />
                    <Toasts />
                    <ContextMenuComp />
                    <CreatePlaylistModal />
                    <ShortcutsModal />

                    {/* Mobile overlays */}
                    {isMobile && mobileNowPlaying && <MobileNowPlaying />}
                    {isMobile && mobileSidebar && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 9970, display: "flex" }}>
                            <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)" }} onClick={() => setMobileSidebar(false)} />
                            <div className="animate-slideInLeft" style={{ position: "relative", width: "85%", maxWidth: 360, height: "100%", background: "#121212", zIndex: 1 }}>
                                <Sidebar overlay onClose={() => setMobileSidebar(false)} />
                            </div>
                        </div>
                    )}
                    <MobileBottomNav />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<SpotifyApp />);
    </script>
</body>

</html>
