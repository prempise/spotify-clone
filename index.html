    /* === BASE === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; }
    #root { height: 100%; }

    /* === CUSTOM SCROLLBARS (from prototype) === */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #535353; border-radius: 6px; border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: #b3b3b3; background-clip: content-box; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* === EQUALIZER BARS (pure CSS – prototype) === */
    @keyframes eq1 { 0%,100%{height:4px} 50%{height:14px} }
    @keyframes eq2 { 0%,100%{height:10px} 33%{height:4px} 66%{height:14px} }
    @keyframes eq3 { 0%,100%{height:8px} 40%{height:14px} 80%{height:4px} }

    /* === ANIMATIONS === */
    @keyframes fadeIn  { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .animate-fadeIn  { animation: fadeIn  0.15s ease-out; }
    .animate-slideUp { animation: slideUp 0.25s ease-out; }
    .animate-toastIn { animation: toastIn 0.28s ease-out; }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* === CARD PLAY BUTTON (prototype-style float-up animation) === */
    .card-play-btn {
      position: absolute; bottom: 8px; right: 8px;
      width: 48px; height: 48px; border-radius: 50%;
      background: #1DB954; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s, background 0.1s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .card-wrap:hover .card-play-btn { opacity: 1; transform: translateY(0); }
    .card-play-btn:hover { background: #1ed760; transform: translateY(0) scale(1.06) !important; }

    /* === QUICK GRID PLAY BUTTON === */
    .quick-play-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1DB954; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.85);
      transition: opacity 0.2s, transform 0.2s, background 0.1s;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
      flex-shrink: 0; margin-right: 8px;
    }
    .quick-card:hover .quick-play-btn { opacity: 1; transform: scale(1); }
    .quick-play-btn:hover { background: #1ed760; }

    /* === BIG PLAY BUTTON (playlist/album hero) === */
    .big-play-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: #1DB954; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.1s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .big-play-btn:hover { background: #1ed760; transform: scale(1.06); }

    /* === SLIDER THUMB POLISH === */
    input[type=range] { -webkit-appearance: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; }
  </style>

    const Ctx = createContext(null);

    const AppProvider = ({ children }) => {
      const [nav, setNav]                     = useState({ page:"home" });

      const [currentTrack, setCurrentTrack]   = useState(enrichTrack(TRACKS[0]));

      const [currentTime, setCurrentTime]     = useState(0);

      const [isMuted, setIsMuted]             = useState(false);
      const [shuffleOn, setShuffleOn]         = useState(false);
      const [repeatMode, setRepeatModeState]  = useState("off");
      const [queue, setQueue]                 = useState([]);
      const [likedSongs, setLikedSongs]       = useState(()=>{ try{return JSON.parse(localStorage.getItem("sp_likes")||'["t1","t6","t20","t29","t32"]')}catch{return[]} });
      const [followedArtists, setFollowed]    = useState(()=>{ try{return JSON.parse(localStorage.getItem("sp_follows")||'["a1","a2","a9"]')}catch{return[]} });
      const [showQueue, setShowQueue]         = useState(false);
      const [toasts, setToasts]               = useState([]);
      const [contextMenu, setContextMenu]     = useState(null);
      const [showCreatePl, setShowCreatePl]   = useState(false);
      const [userPlaylists, setUserPlaylists] = useState(PLAYLISTS);

      const timerRef = useRef(null);
      const toastId  = useRef(0);

      useEffect(()=>{ localStorage.setItem("sp_likes",   JSON.stringify(likedSongs)); },     [likedSongs]);
      useEffect(()=>{ localStorage.setItem("sp_follows", JSON.stringify(followedArtists)); },[followedArtists]);

      useEffect(()=>{
        if(isPlaying && currentTrack){
          timerRef.current = setInterval(()=>{
            setCurrentTime(prev=>{
              if(prev>=currentTrack.duration-1){ if(repeatMode==="one")return 0; setTimeout(()=>playNext(),0); return 0; }
              return prev+1;
            });
          },1000);
        }
        return ()=>clearInterval(timerRef.current);
      },[isPlaying,currentTrack,repeatMode]);

      const navigate = useCallback((page,id)=>{
        const nn={page,id};
        setNav(nn);
        setNavHistory(prev=>{ const next=[...prev.slice(0,navIdx+1),nn]; setNavIdx(next.length-1); return next; });
      },[navIdx]);

      const goBack    = useCallback(()=>{ if(navIdx>0){ setNavIdx(i=>i-1); setNav(navHistory[navIdx-1]); } },[navIdx,navHistory]);
      const goForward = useCallback(()=>{ if(navIdx<navHistory.length-1){ setNavIdx(i=>i+1); setNav(navHistory[navIdx+1]); } },[navIdx,navHistory]);

      const playTrack = useCallback((track,trackList)=>{
        const e=enrichTrack(track);
        setCurrentTrack(e); setCurrentTime(0); setIsPlaying(true);
        if(trackList){ const i=trackList.findIndex(t=>t.id===track.id); setQueue(trackList.slice(i+1).map(enrichTrack)); }
      },[]);

      const togglePlay = useCallback(()=>setIsPlaying(p=>!p),[]);

      const playNext = useCallback(()=>{
        if(queue.length>0){
          const next = shuffleOn ? queue[Math.floor(Math.random()*queue.length)] : queue[0];
          setCurrentTrack(next); setQueue(q=>q.filter(t=>t.id!==next.id)); setCurrentTime(0);
        } else if(repeatMode==="all"){ setCurrentTime(0); } else { setIsPlaying(false); }
      },[queue,shuffleOn,repeatMode]);

      const playPrev = useCallback(()=>setCurrentTime(0),[]);
      const seek     = useCallback((t)=>setCurrentTime(t),[]);

      const addToast = useCallback((msg)=>{
        const id=++toastId.current;
        setToasts(prev=>[...prev,{id,msg}]);
        setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),3000);
      },[]);

      const toggleLike = useCallback((trackId)=>{
        setLikedSongs(prev=>{ const has=prev.includes(trackId); addToast(has?"Removed from Liked Songs":"Added to Liked Songs"); return has?prev.filter(i=>i!==trackId):[...prev,trackId]; });
      },[]);

      const toggleFollow = useCallback((artistId)=>{
        setFollowed(prev=>{ const has=prev.includes(artistId); addToast(has?"Unfollowed":"Following"); return has?prev.filter(i=>i!==artistId):[...prev,artistId]; });
      },[]);

      const addToQueue = useCallback((track)=>{ setQueue(q=>[...q,enrichTrack(track)]); addToast("Added to queue"); },[]);

      const cycleRepeat = useCallback(()=>setRepeatModeState(m=>m==="off"?"all":m==="all"?"one":"off"),[]);

      const createPlaylist = useCallback((name)=>{
        const pl={ id:"pl_"+Date.now(), name, description:"", cover:`https://picsum.photos/seed/${Date.now()}/300`, owner:"You", isLikedSongs:false, trackIds:[], followers:0, isPublic:true };
        setUserPlaylists(prev=>[...prev,pl]); addToast("Playlist created"); setShowCreatePl(false);
      },[]);

      useEffect(()=>{
        const hk=(e)=>{
          if(e.target instanceof HTMLInputElement) return;
          if(e.code==="Space"){ e.preventDefault(); togglePlay(); }
          if(e.code==="ArrowRight"){ e.preventDefault(); seek(Math.min(currentTime+10,currentTrack?.duration||0)); }
          if(e.code==="ArrowLeft") { e.preventDefault(); seek(Math.max(currentTime-10,0)); }
          if(e.code==="ArrowUp")   { e.preventDefault(); setVolume(v=>Math.min(v+0.1,1)); }
          if(e.code==="ArrowDown") { e.preventDefault(); setVolume(v=>Math.max(v-0.1,0)); }
        };
        window.addEventListener("keydown",hk);
        return ()=>window.removeEventListener("keydown",hk);
      },[currentTime,currentTrack]);

      const value = useMemo(()=>({
        nav,navigate,goBack,goForward,navIdx,navHistory,
        currentTrack,isPlaying,currentTime,volume,isMuted,shuffleOn,repeatMode,queue,
        playTrack,togglePlay,playNext,playPrev,seek,setVolume,setIsMuted,setShuffleOn,
        cycleRepeat,likedSongs,toggleLike,followedArtists,toggleFollow,
        showQueue,setShowQueue,toasts,addToast,contextMenu,setContextMenu,
        showCreatePl,setShowCreatePl,userPlaylists,createPlaylist,addToQueue,
      }),[nav,currentTrack,isPlaying,currentTime,volume,isMuted,shuffleOn,repeatMode,queue,
          likedSongs,followedArtists,showQueue,toasts,contextMenu,showCreatePl,userPlaylists,
          navIdx,navHistory]);

      return <Ctx.Provider value={value}>{children}</Ctx.Provider>;
    };

      const [drag, setDrag]   = useState(false);
      const [hov,  setHov]    = useState(false);
      const pct = max>0 ? (value/max)*100 : 0;

      const calc = useCallback((e)=>{
        if(!ref.current) return;
        const r=ref.current.getBoundingClientRect();
        onChange(Math.max(0,Math.min(e.clientX-r.left,r.width))/r.width*max);
      },[max,onChange]);

      useEffect(()=>{
        if(!drag) return;
        const mv=(e)=>calc(e), up=()=>setDrag(false);
        window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
        return ()=>{ window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
      },[drag,calc]);

      return (
        <div ref={ref} style={{ position:"relative",height:12,display:"flex",alignItems:"center",cursor:"pointer",flex:1 }}
          onMouseDown={(e)=>{ setDrag(true); calc(e); }}
          onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
          <div style={{ width:"100%",height: hov||drag?5:3,borderRadius:3,backgroundColor:"#4d4d4d",transition:"height 0.1s",position:"relative" }}>
            <div style={{ width:`${pct}%`,height:"100%",borderRadius:3,backgroundColor:hov||drag?accent:"#fff",transition:"background 0.1s" }}/>
          </div>
          {(hov||drag) && (
            <div style={{ position:"absolute",left:`calc(${pct}% - 6px)`,width:12,height:12,borderRadius:"50%",background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.4)" }}/>
          )}
        </div>
      );

    /* ===================== TOASTS ===================== */
    const Toasts = () => {

        <div style={{ position:"fixed",bottom:106,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none" }}>
          {toasts.map(t=>(
            <div key={t.id} className="animate-toastIn" style={{
              background:"#242424",color:"#fff",border:"1px solid #727272",
              padding:"12px 24px",borderRadius:4,fontSize:14,fontWeight:600,
              whiteSpace:"nowrap",textAlign:"center",
            }}>{t.msg}</div>
          ))}
        </div>
      );
    };

    /* ===================== CONTEXT MENU ===================== */
    const ContextMenuComp = () => {
      const { contextMenu, setContextMenu, toggleLike, likedSongs, addToQueue, navigate } = useApp();
      const ref = useRef(null);

      useEffect(()=>{
        const hnd=(e)=>{ if(ref.current&&!ref.current.contains(e.target))setContextMenu(null); };
        const esc=(e)=>{ if(e.key==="Escape")setContextMenu(null); };
        document.addEventListener("mousedown",hnd); document.addEventListener("keydown",esc);
        return ()=>{ document.removeEventListener("mousedown",hnd); document.removeEventListener("keydown",esc); };
      },[]);

      if(!contextMenu) return null;
      const { x, y, track } = contextMenu;
      const liked = likedSongs.includes(track?.id);
      const items = [
        { label:"Add to queue",   action:()=>{ addToQueue(track); setContextMenu(null); } },
        { divider:true },
        { label:"Go to artist",   action:()=>{ navigate("artist",track.artistId); setContextMenu(null); } },
        { label:"Go to album",    action:()=>{ navigate("album",track.albumId);   setContextMenu(null); } },
        { divider:true },
        { label: liked?"Remove from Liked Songs":"Save to Liked Songs", action:()=>{ toggleLike(track.id); setContextMenu(null); } },
        { divider:true },
        { label:"Share",          action:()=>{ navigator.clipboard?.writeText(window.location.href); setContextMenu(null); } },
      ];
      return (
        <div ref={ref} className="animate-fadeIn" style={{
          position:"fixed",left:Math.min(x,window.innerWidth-224),top:Math.min(y,window.innerHeight-300),
          width:220,background:"#282828",borderRadius:4,boxShadow:"0 16px 24px rgba(0,0,0,0.5)",
          zIndex:9998,padding:"4px 0",

              width:"100%",textAlign:"left",padding:"10px 14px",fontSize:14,color:"#fff",
              background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,
            }}
              onMouseEnter={e=>e.currentTarget.style.background="#3e3e3e"}
              onMouseLeave={e=>e.currentTarget.style.background="none"}
            >{item.label}</button>
          )}
        </div>
      );
    };

    /* ===================== CREATE PLAYLIST MODAL ===================== */
    const CreatePlaylistModal = () => {

            </div>
          </div>

    /* ===================== CARD ===================== */
    const Card = memo(({ item, type, onClick }) => {

        else if(type==="album")  { const ts=tracksForAlbum(item.id);  if(ts.length)playTrack(ts[0],ts); }
        else if(type==="artist") { const ts=tracksForArtist(item.id); if(ts.length)playTrack(ts[0],ts); }

        <div className="card-wrap" style={{ padding:16,borderRadius:8,background:hov?"#282828":"#181818",cursor:"pointer",transition:"background 0.2s",position:"relative" }}

              onMouseLeave={e=>e.currentTarget.style.textDecoration=""}>

            </span>

          <div style={{ display:"flex",justifyContent:"center" }}>

                onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}

                <IcoHeart sz={16} fill={liked?"#1DB954":"none"} col={liked?"#1DB954":"#A7A7A7"} />

                   showAlbum             ? "40px 4fr 3fr 40px 50px" :
                                           "40px 4fr 40px 50px";

        <div style={{ display:"grid",gridTemplateColumns:cols,gap:8,padding:"0 8px 8px",borderBottom:"1px solid #282828",marginBottom:8 }}>

      return (

          </div>

          {/* Track table */}
          <div style={{ padding:"0 24px",marginTop:16 }}>
            <TrackTableHeader showAlbum showDate/>
            {tracks.map((t,i)=>(
              <TrackRow key={t.id} track={t} index={i} showAlbum showDate onPlay={tr=>playTrack(tr,tracks)}/>
            ))}
            {tracks.length===0 && (
              <div style={{ textAlign:"center",padding:"64px 0" }}>
                <IcoMusic sz={48} col="#A7A7A7" style={{ margin:"0 auto 16px" }}/>
                <p style={{ color:"#fff",fontSize:18,fontWeight:700,marginBottom:8 }}>This playlist is empty</p>
                <p style={{ color:"#A7A7A7",fontSize:14 }}>Find songs to add here.</p>
              </div>
            )}
          </div>
          <div style={{ height:32 }}/>
        </div>
      );
    };

    /* ===================== LIKED SONGS PAGE ===================== */
    const LikedSongsPage = () => {
      const { playTrack, likedSongs } = useApp();
      const [scrolled, setScrolled] = useState(false);
      const scrollRef = useRef(null);
      const tracks = likedSongs.map(getTrack).filter(Boolean);
      const totalDur = tracks.reduce((s,t)=>s+t.duration,0);

      useEffect(()=>{
        const el=scrollRef.current; if(!el) return;
        const h=()=>setScrolled(el.scrollTop>300);
        el.addEventListener("scroll",h); return ()=>el.removeEventListener("scroll",h);
      },[]);

      return (
        <div ref={scrollRef} style={{ flex:1,overflowY:"auto",borderRadius:8,background:"#121212" }}>
          <Header scrolled={scrolled}/>
          <div style={{ padding:"0 24px 24px",marginTop:-72,paddingTop:72,background:"linear-gradient(180deg,#450af5 0%,#121212 60%)",minHeight:340 }}>
            <div style={{ display:"flex",gap:24,alignItems:"flex-end" }}>
              <div style={{ width:232,height:232,borderRadius:4,background:"linear-gradient(135deg,#450af5,#c4efd9)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 60px rgba(0,0,0,0.5)" }}>
                <IcoHeart sz={80} fill="white" col="white"/>
              </div>
              <div style={{ paddingBottom:8 }}>
                <p style={{ fontSize:12,fontWeight:700,color:"#fff",textTransform:"uppercase",marginBottom:8 }}>Playlist</p>
                <h1 style={{ fontSize:48,fontWeight:900,color:"#fff",lineHeight:1.05,marginBottom:8,letterSpacing:"-1px" }}>Liked Songs</h1>
                <p style={{ fontSize:14,color:"rgba(255,255,255,0.7)" }}>
                  <strong style={{ color:"#fff" }}>You</strong>
                  {" "} • {tracks.length} songs, <span style={{ color:"rgba(255,255,255,0.5)" }}>{Math.floor(totalDur/3600)} hr {Math.floor((totalDur%3600)/60)} min</span>
                </p>
              </div>
            </div>
          </div>
          <div style={{ padding:"24px 24px 8px",display:"flex",alignItems:"center",gap:24 }}>
            <button className="big-play-btn" onClick={()=>tracks.length>0&&playTrack(tracks[0],tracks)}>
              <IcoPlay sz={24} fill="black" col="black"/>
            </button>
            <button style={{ background:"none",border:"none",cursor:"pointer",color:"#A7A7A7",display:"flex" }}
              onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="#A7A7A7"}>
              <IcoShuffle sz={24}/>
            </button>
          </div>
          <div style={{ padding:"0 24px" }}>
            <TrackTableHeader showAlbum showDate/>
            {tracks.map((t,i)=>(
              <TrackRow key={t.id} track={t} index={i} showAlbum showDate onPlay={tr=>playTrack(tr,tracks)}/>
            ))}
            {tracks.length===0 && (
              <div style={{ textAlign:"center",padding:"64px 0" }}>
                <IcoHeart sz={48} col="#A7A7A7" style={{ margin:"0 auto 16px" }}/>
                <p style={{ color:"#fff",fontSize:18,fontWeight:700,marginBottom:8 }}>Songs you like will appear here</p>
                <p style={{ color:"#A7A7A7",fontSize:14,marginBottom:24 }}>Save songs by tapping the heart icon.</p>
              </div>
            )}
          </div>
          <div style={{ height:32 }}/>
        </div>
      );
    };

    /* ===================== ARTIST PAGE ===================== */
    const ArtistPage = ({ artistId }) => {
      const { playTrack, navigate, toggleFollow, followedArtists, addToast } = useApp();
      const [scrolled, setScrolled] = useState(false);
      const scrollRef = useRef(null);
      const artist = getArtist(artistId)||ARTISTS[0];
      const artistTracks = tracksForArtist(artistId).slice(0,5);
      const artistAlbums = albumsForArtist(artistId);
      const isFollowed = followedArtists.includes(artistId);

      useEffect(()=>{
        const el=scrollRef.current; if(!el) return;
        const h=()=>setScrolled(el.scrollTop>350);
        el.addEventListener("scroll",h); return ()=>el.removeEventListener("scroll",h);
      },[artistId]);

      return (
        <div ref={scrollRef} style={{ flex:1,overflowY:"auto",borderRadius:8,background:"#121212" }}>
          <Header scrolled={scrolled}/>
          {/* Artist header */}
          <div style={{ position:"relative",minHeight:340,marginTop:-72 }}>
            <img src={artist.header} alt="" style={{ position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top" }}/>
            <div style={{ position:"absolute",inset:0,background:"linear-gradient(transparent 30%,rgba(18,18,18,0.9))" }}/>
            <div style={{ position:"relative",padding:"200px 24px 24px" }}>
              {artist.verified && (
                <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                  <IcoCheck sz={16} col="#3d91f4"/>
                  <span style={{ fontSize:13,color:"#fff",fontWeight:600 }}>Verified Artist</span>
                </div>
              )}
              <h1 style={{ fontSize:64,fontWeight:900,color:"#fff",lineHeight:1,letterSpacing:"-2px",marginBottom:8 }}>{artist.name}</h1>
              <p style={{ fontSize:14,color:"rgba(255,255,255,0.7)" }}>{fmtNum(artist.monthly)} monthly listeners</p>
            </div>
          </div>

          {/* Controls */}
          <div style={{ padding:"24px 24px 8px",display:"flex",alignItems:"center",gap:24 }}>
            <button className="big-play-btn" onClick={()=>artistTracks.length>0&&playTrack(artistTracks[0],artistTracks)}>
              <IcoPlay sz={24} fill="black" col="black"/>
            </button>
            <button onClick={()=>toggleFollow(artistId)} style={{
              padding:"6px 20px",borderRadius:100,background:"none",fontWeight:700,fontSize:14,cursor:"pointer",
              border:`1px solid ${isFollowed?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.3)"}`,
              color:isFollowed?"#fff":"#fff",transition:"border-color 0.1s,transform 0.1s",
            }}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#fff"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.3)"}>
              {isFollowed?"Following":"Follow"}
            </button>
            <button style={{ background:"none",border:"none",cursor:"pointer",color:"#A7A7A7",display:"flex" }}
              onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="#A7A7A7"}>
              <IcoMore sz={24}/>
            </button>
          </div>

          <div style={{ padding:"0 24px 32px" }}>
            {/* Popular tracks */}
            <h2 style={{ fontSize:22,fontWeight:800,color:"#fff",marginBottom:16 }}>Popular</h2>
            <div style={{ marginBottom:32 }}>
              <TrackTableHeader showAlbum={false}/>
              {artistTracks.map((t,i)=>(
                <TrackRow key={t.id} track={t} index={i} showAlbum={false} onPlay={tr=>playTrack(tr,artistTracks)}/>
              ))}
            </div>

            {/* Albums */}
            {artistAlbums.length>0 && <ScrollSection title={`Albums by ${artist.name}`} items={artistAlbums} type="album"/>}

            {/* Bio */}
            {artist.bio && (
              <div style={{ marginTop:8 }}>
                <h2 style={{ fontSize:22,fontWeight:800,color:"#fff",marginBottom:12 }}>About</h2>
                <div style={{ background:"#1a1a1a",borderRadius:8,padding:24,position:"relative",overflow:"hidden" }}>
                  <img src={artist.header} alt="" style={{ position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:0.15,filter:"blur(4px)" }}/>
                  <div style={{ position:"relative" }}>
                    <p style={{ fontSize:16,color:"rgba(255,255,255,0.85)",lineHeight:1.7,marginBottom:16 }}>{artist.bio}</p>
                    <p style={{ fontSize:14,fontWeight:700,color:"#fff" }}>{fmtNum(artist.monthly)} monthly listeners</p>
                    <p style={{ fontSize:14,color:"#A7A7A7" }}>{fmtNum(artist.followers)} followers</p>
                    <div style={{ display:"flex",gap:8,marginTop:12 }}>
                      {artist.genres.map(g=>(
                        <span key={g} style={{ padding:"4px 12px",borderRadius:100,background:"#2a2a2a",fontSize:13,color:"#fff" }}>{g}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    /* ===================== ALBUM PAGE ===================== */
    const AlbumPage = ({ albumId }) => {
      const { playTrack, navigate, addToast } = useApp();
      const [scrolled, setScrolled] = useState(false);
      const scrollRef = useRef(null);
      const album  = getAlbum(albumId)||ALBUMS[0];
      const artist = getArtist(album.artistId);
      const tracks = tracksForAlbum(albumId);
      const totalDur = tracks.reduce((s,t)=>s+t.duration,0);
      const gradColor = heroGrad(album.title);

      useEffect(()=>{
        const el=scrollRef.current; if(!el) return;
        const h=()=>setScrolled(el.scrollTop>300);
        el.addEventListener("scroll",h); return ()=>el.removeEventListener("scroll",h);
      },[albumId]);

      return (
        <div ref={scrollRef} style={{ flex:1,overflowY:"auto",borderRadius:8,background:"#121212" }}>
          <Header scrolled={scrolled}/>
          <div style={{ padding:"0 24px 24px",marginTop:-72,paddingTop:72,background:`linear-gradient(180deg,${gradColor} 0%,#121212 60%)`,minHeight:340 }}>
            <div style={{ display:"flex",gap:24,alignItems:"flex-end" }}>
              <img src={album.cover} alt="" style={{ width:232,height:232,borderRadius:4,objectFit:"cover",flexShrink:0,boxShadow:"0 4px 60px rgba(0,0,0,0.5)" }}/>
              <div style={{ paddingBottom:8 }}>
                <p style={{ fontSize:12,fontWeight:700,color:"#fff",textTransform:"uppercase",marginBottom:8 }}>{album.type}</p>
                <h1 style={{ fontSize:48,fontWeight:900,color:"#fff",lineHeight:1.05,marginBottom:8,letterSpacing:"-1px" }}>{album.title}</h1>
                <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                  <img src={artist?.image} alt="" style={{ width:24,height:24,borderRadius:"50%",objectFit:"cover" }}/>
                  <span style={{ fontSize:14,color:"#fff",fontWeight:700,cursor:"pointer" }}
                    onClick={()=>navigate("artist",album.artistId)}
                    onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"}
                    onMouseLeave={e=>e.currentTarget.style.textDecoration=""}>{artist?.name}</span>
                  <span style={{ color:"rgba(255,255,255,0.5)" }}>•</span>
                  <span style={{ fontSize:14,color:"rgba(255,255,255,0.7)" }}>{album.year}</span>
                  <span style={{ color:"rgba(255,255,255,0.5)" }}>•</span>
                  <span style={{ fontSize:14,color:"rgba(255,255,255,0.7)" }}>{tracks.length} songs, {Math.floor(totalDur/60)} min</span>
                </div>
              </div>
            </div>
          </div>

          <div style={{ padding:"24px 24px 8px",display:"flex",alignItems:"center",gap:24,background:`linear-gradient(180deg,${gradColor}33 0%,transparent 100%)` }}>
            <button className="big-play-btn" onClick={()=>tracks.length>0&&playTrack(tracks[0],tracks)}>
              <IcoPlay sz={24} fill="black" col="black"/>
            </button>
            <button onClick={()=>addToast("Added to library")} style={{ background:"none",border:"none",cursor:"pointer",color:"#A7A7A7",display:"flex" }}
              onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="#A7A7A7"}>
              <IcoMore sz={24}/>
            </button>
          </div>

          <div style={{ padding:"0 24px" }}>
            <TrackTableHeader showAlbum={false}/>
            {tracks.map((t,i)=>(
              <TrackRow key={t.id} track={t} index={i} showAlbum={false} onPlay={tr=>playTrack(tr,tracks)}/>
            ))}
          </div>
          <div style={{ padding:"24px",color:"#A7A7A7",fontSize:13 }}>
            <p style={{ fontWeight:700,marginBottom:4 }}>{album.year}</p>
            <p>{album.copyright}</p>
            <p>{album.label}</p>
          </div>
        </div>
      );
    };

    /* ===================== APP ===================== */
    function SpotifyApp() {
      const renderPage = (nav) => {
        switch(nav.page){
          case "search":   return <SearchPage/>;
          case "playlist": return <PlaylistPage playlistId={nav.id||"pl2"}/>;
          case "artist":   return <ArtistPage   artistId={nav.id||"a1"}/>;
          case "album":    return <AlbumPage     albumId={nav.id||"al1"}/>;
          case "liked":    return <LikedSongsPage/>;
          default:         return <HomePage/>;
        }
      };
      return (
        <AppProvider>
          <AppInner renderPage={renderPage}/>
        </AppProvider>
      );
    }

    function AppInner({ renderPage }) {
      const { nav } = useApp();
      return (
        <div style={{ display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"#000",fontFamily:"'Circular Std',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" }}>
          <div style={{ display:"flex",flex:1,gap:8,padding:8,overflow:"hidden" }}>
            <Sidebar/>
            {renderPage(nav)}
            <QueuePanel/>
          </div>
          <PlayerBar/>
          <Toasts/>
          <ContextMenuComp/>
          <CreatePlaylistModal/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SpotifyApp/>);
  </script>
</body>
</html>
